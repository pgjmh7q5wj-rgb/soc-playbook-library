name: Weekly Update Check (MITRE + XSOAR)

on:
  schedule:
    # Každé pondělí v 08:00 UTC
    - cron: '0 8 * * 1'
  # Možnost spustit manuálně z GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  # ── Job 1: MITRE ATT&CK diff ───────────────────────────────────────────────
  mitre-check:
    name: MITRE ATT&CK Diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run MITRE diff
        run: python scripts/mitre_diff.py

      - name: Upload MITRE changes artifact
        uses: actions/upload-artifact@v4
        with:
          name: mitre-changes
          path: data/mitre_changes.json
          retention-days: 1

  # ── Job 2: XSOAR Pack check ────────────────────────────────────────────────
  xsoar-check:
    name: XSOAR Pack Version Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run XSOAR pack check
        run: python scripts/xsoar_pack_check.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload XSOAR changes artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsoar-changes
          path: |
            data/xsoar_changes.json
            data/xsoar_pack_versions.json
          retention-days: 1

  # ── Job 3: Generovat report + commit + issue ───────────────────────────────
  generate-report:
    name: Generate Report & Create Issue
    runs-on: ubuntu-latest
    needs: [mitre-check, xsoar-check]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download MITRE changes
        uses: actions/download-artifact@v4
        with:
          name: mitre-changes
          path: data/

      - name: Download XSOAR changes
        uses: actions/download-artifact@v4
        with:
          name: xsoar-changes
          path: data/

      - name: Generate combined report
        run: python scripts/generate_report.py

      - name: Commit updated data + report
        run: |
          git config user.name  "SOC Update Bot"
          git config user.email "bot@soc-playbook-library"
          git add data/ reports/
          # Commit pouze pokud jsou změny
          git diff --staged --quiet || git commit -m \
            "chore: weekly update check $(date +%Y-%m-%d)"
          git push

      - name: Create GitHub Issue (pokud jsou změny)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issuePath = 'data/github_issue.json';

            if (!fs.existsSync(issuePath)) {
              console.log('Žádné změny – issue se nevytváří.');
              return;
            }

            const issue = JSON.parse(fs.readFileSync(issuePath, 'utf8'));

            if (!issue.title) {
              console.log('Prázdný issue payload – přeskakuji.');
              return;
            }

            // Zkontroluj zda issue se stejným titulem již neexistuje
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'update',
            });

            const alreadyExists = existing.data.some(i => i.title === issue.title);
            if (alreadyExists) {
              console.log('Issue již existuje – přeskakuji.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issue.title,
              body: issue.body,
              labels: issue.labels || ['update', 'maintenance'],
            });

            console.log(`✅ Issue vytvořeno: ${issue.title}`);
